# Runs lint + tests before commit; install with: make install-hooks

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src/ tests/
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check src/ tests/
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy type checking
        entry: uv run mypy src/
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest unit tests
        entry: uv run pytest tests/ -v
        language: system
        pass_filenames: false
